<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>AI Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #1a1a1a; color: #fff; height: 100vh; display: flex; flex-direction: column; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 70%; padding: 10px 14px; border-radius: 12px; line-height: 1.5; }
        .user { background: #2563eb; align-self: flex-end; }
        .ai { background: #2d2d2d; align-self: flex-start; }
        #input-area { display: flex; padding: 16px; gap: 10px; border-top: 1px solid #333; }
        #input { flex: 1; padding: 10px 14px; border-radius: 8px; border: none; background: #2d2d2d; color: #fff; font-size: 15px; }
        #send { padding: 10px 20px; background: #2563eb; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 15px; }
        #send:hover { background: #1d4ed8; }
    </style>
</head>
<body>
    <div id="chat-box"></div>
    <div id="input-area">
        <input id="input" type="text" placeholder="输入消息..." />
        <button id="send">发送</button>
    </div>

    <script>
        let history = [];

        function addMsg(role, text) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            div.textContent = text;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        async function send() {
            const input = document.getElementById('input');
            const msg = input.value.trim();
            if (!msg) return;
            input.value = '';

            addMsg('user', msg);

            const res = await fetch('http://127.0.0.1:8000/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: msg, history })
            });

            const data = await res.json();
            addMsg('ai', data.reply);
            history = data.history;
        }

        document.getElementById('send').onclick = send;
        document.getElementById('input').addEventListener('keydown', e => {
            if (e.key === 'Enter') send();
        });
    </script>
</body>
</html>
