<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>Reviagent</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @font-face {
            font-family: 'CascadiaMonoLocal';
            src: url('/CascadiaMono.ttf') format('truetype');
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'CascadiaMonoLocal', 'Cascadia Mono', monospace;
            background: #0f0f0f; color: #fff; height: 100vh;
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* 登录页 */
        #auth-page {
            display: flex; align-items: center; justify-content: center;
            height: 100vh; flex-direction: column; gap: 24px;
        }
        #auth-page img { width: 120px; opacity: 0.9; margin-bottom: 8px; }
        #auth-box {
            display: flex; flex-direction: column; gap: 12px;
            width: 320px; background: #1a1a1a; padding: 28px;
            border-radius: 14px; border: 1px solid #2a2a2a;
        }
        #auth-box h2 { font-size: 16px; font-weight: 400; color: #aaa; text-align: center; margin-bottom: 4px; }
        #auth-box input {
            padding: 10px 14px; border-radius: 8px; border: 1px solid #2a2a2a;
            background: #0f0f0f; color: #fff; font-size: 14px; outline: none;
            font-family: inherit;
        }
        #auth-box input:focus { border-color: #2563eb; }
        #auth-box button {
            padding: 10px; background: #2563eb; color: #fff; border: none;
            border-radius: 8px; cursor: pointer; font-size: 14px; font-family: inherit;
        }
        #auth-box button:hover { background: #1d4ed8; }
        #auth-toggle { text-align: center; font-size: 12px; color: #555; cursor: pointer; }
        #auth-toggle span { color: #2563eb; }
        #auth-error { font-size: 12px; color: #ef4444; text-align: center; min-height: 16px; }

        /* 主界面 */
        #app { display: none; flex-direction: column; height: 100vh; }
        #app.visible { display: flex; }
        #topbar {
            display: flex; align-items: center; padding: 12px 20px;
            border-bottom: 1px solid #1e1e1e; background: #0f0f0f;
        }
        #topbar img { height: 26px; opacity: 0.9; }
        #topbar-username { margin-left: 12px; font-size: 12px; color: #555; }
        #chat-box {
            flex: 1; overflow-y: auto; padding: 24px 20px;
            display: flex; flex-direction: column; gap: 14px; position: relative;
        }
        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }
        #welcome {
            position: absolute; inset: 0; display: flex; align-items: center;
            justify-content: center; pointer-events: none;
            opacity: 0; animation: welcomeIn 0.8s ease 0.3s forwards;
            transition: opacity 0.5s ease;
        }
        #welcome.hidden { opacity: 0 !important; animation: none; }
        #welcome-text {
            font-size: 36px; color: #fff; letter-spacing: 0.12em;
            text-align: center; line-height: 1.8; font-weight: 200;
        }
        @keyframes welcomeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg { max-width: 68%; padding: 10px 15px; border-radius: 14px; line-height: 1.6; font-size: 14px; animation: popIn 0.2s ease; }
        @keyframes popIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .user { background: #2563eb; align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai { background: #1a1a1a; align-self: flex-start; border: 1px solid #2a2a2a; border-bottom-left-radius: 4px; }
        .system { background: none; align-self: center; font-size: 12px; color: #444; padding: 2px 0; }
        .dot1, .dot2, .dot3 { color: #555; }
        @keyframes wave1 { 0%,100%{color:#555} 0%{color:#fff} }
        @keyframes wave2 { 0%,100%{color:#555} 20%{color:#fff} }
        @keyframes wave3 { 0%,100%{color:#555} 40%{color:#fff} }
        .dot1 { animation: wave1 1.2s infinite; }
        .dot2 { animation: wave2 1.2s infinite; }
        .dot3 { animation: wave3 1.2s infinite; }
        .ai ol, .ai ul { padding-left: 20px; margin: 8px 0; }
        .ai li { list-style-position: inside; margin-bottom: 4px; }
        .ai p { margin-bottom: 8px; }
        .ai h1, .ai h2, .ai h3 { margin: 12px 0 6px 0; }
        #input-area {
            display: flex; align-items: center; padding: 14px 16px; gap: 10px;
            border-top: 1px solid #1e1e1e; background: #0f0f0f;
        }
        #input {
            flex: 1; padding: 10px 16px; border-radius: 10px; border: 1px solid #2a2a2a;
            background: #1a1a1a; color: #fff; font-size: 14px; outline: none;
            font-family: inherit; transition: border-color 0.2s;
        }
        #input:focus { border-color: #2563eb; }
        #send {
            padding: 10px 18px; background: #2563eb; color: #fff;
            border: none; border-radius: 10px; cursor: pointer; font-size: 14px;
            font-family: inherit;
        }
        #send:hover { background: #1d4ed8; }
        #clip-btn {
            background: none; border: none; cursor: pointer; color: #444;
            font-size: 20px; padding: 4px 6px;
        }
        #clip-btn:hover { color: #fff; }
        #file-input { display: none; }
    </style>
</head>
<body>

<!-- 登录页 -->
<div id="auth-page">
    <img src="/logo.png" alt="Reviagent"/>
    <div id="auth-box">
        <h2 id="auth-title">登录</h2>
        <input id="auth-username" type="text" placeholder="用户名"/>
        <input id="auth-password" type="password" placeholder="密码"/>
        <div id="auth-error"></div>
        <button id="auth-btn" onclick="authSubmit()">登录</button>
        <div id="auth-toggle">没有账号？<span onclick="toggleAuth()">注册</span></div>
    </div>
</div>

<!-- 主界面 -->
<div id="app">
    <div id="topbar">
        <img src="/logo.png" alt="Reviagent"/>
        <span id="topbar-username"></span>
        <button onclick="newChat()" style="margin-left:auto; background:none; border:1px solid #2a2a2a; color:#aaa; padding:6px 14px; border-radius:8px; cursor:pointer; font-family:inherit; font-size:13px;">新对话</button>
        <button onclick="openProfile()" style="margin-left:8px; background:none; border:1px solid #2a2a2a; color:#aaa; padding:6px 14px; border-radius:8px; cursor:pointer; font-family:inherit; font-size:13px;">⚙️</button>
        <button onclick="logout()" style="margin-left:8px; background:none; border:1px solid #2a2a2a; color:#aaa; padding:6px 14px; border-radius:8px; cursor:pointer; font-family:inherit; font-size:13px;">退出</button>
    </div>
    <div id="chat-box">
        <div id="welcome"><div id="welcome-text"></div></div>
    </div>
    <div id="input-area">
        <input type="file" id="file-input" accept=".pdf,.docx,.txt,.md" onchange="uploadFile()"/>
        <button id="clip-btn" onclick="document.getElementById('file-input').click()">📎</button>
        <input id="input" type="text" placeholder="输入消息..."/>
        <button id="send">发送</button>
    </div>
</div>

<script>
    const welcomePhrases = ['今天想忙点什么？', '问问我', '向我提问'];
    let history = [];
    let welcomed = false;
    let isRegister = false;
    let token = localStorage.getItem('token');
    let username = localStorage.getItem('username');

    // 启动时检查登录态
    if (token) enterApp();

    function toggleAuth() {
        isRegister = !isRegister;
        document.getElementById('auth-title').textContent = isRegister ? '注册' : '登录';
        document.getElementById('auth-btn').textContent = isRegister ? '注册' : '登录';
        document.getElementById('auth-toggle').innerHTML = isRegister
            ? '已有账号？<span onclick="toggleAuth()">登录</span>'
            : '没有账号？<span onclick="toggleAuth()">注册</span>';
        document.getElementById('auth-error').textContent = '';
    }

    async function authSubmit() {
        const u = document.getElementById('auth-username').value.trim();
        const p = document.getElementById('auth-password').value.trim();
        if (!u || !p) { document.getElementById('auth-error').textContent = '请填写用户名和密码'; return; }
        const url = isRegister ? '/auth/register' : '/auth/login';
        try {
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, password: p })
            });
            const data = await res.json();
            if (!res.ok) { document.getElementById('auth-error').textContent = data.detail || '请求失败'; return; }
            token = data.token;
            username = data.username;
            localStorage.setItem('token', token);
            localStorage.setItem('username', username);
            enterApp();
        } catch(e) {
            document.getElementById('auth-error').textContent = '网络错误';
        }
    }

    function enterApp() {
        document.getElementById('auth-page').style.display = 'none';
        document.getElementById('app').classList.add('visible');
        document.getElementById('topbar-username').textContent = username;
        document.getElementById('welcome-text').textContent =
            welcomePhrases[Math.floor(Math.random() * welcomePhrases.length)];
        loadHistory();
    }

    function logout() {
        localStorage.removeItem('token');
        localStorage.removeItem('username');
        token = null; username = null;
        history = []; welcomed = false;
        document.getElementById('app').classList.remove('visible');
        document.getElementById('auth-page').style.display = 'flex';
        document.getElementById('auth-username').value = '';
        document.getElementById('auth-password').value = '';
    }

    function authHeaders() {
        return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
    }

    function hideWelcome() {
        if (!welcomed) {
            welcomed = true;
            document.getElementById('welcome').classList.add('hidden');
        }
    }

    async function loadHistory() {
        const res = await fetch('/history', { headers: { 'Authorization': `Bearer ${token}` } });
        if (!res.ok) return;
        const msgs = await res.json();
        if (msgs.length === 0) return;
        history = msgs;
        document.getElementById('chat-box').innerHTML = '';
        const box = document.getElementById('chat-box');
        msgs.forEach(m => {
            const div = document.createElement('div');
            div.className = m.role === 'user' ? 'msg user' : 'msg ai';
            if (m.role === 'user') div.textContent = m.content;
            else div.innerHTML = marked.parse(m.content);
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
        welcomed = true;
    }

    async function newChat() {
        history = []; welcomed = false;
        await fetch('/history', { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
        document.getElementById('chat-box').innerHTML = '<div id="welcome"><div id="welcome-text">' + welcomePhrases[Math.floor(Math.random() * welcomePhrases.length)] + '</div></div>';
    }

    async function openProfile() {
        const res = await fetch('/profile', { headers: { 'Authorization': `Bearer ${token}` } });
        const data = await res.json();
        const input = prompt('输入你的个人信息（会写入AI的系统提示词）：', data.profile || '');
        if (input === null) return;
        await fetch('/profile', { method: 'POST', headers: authHeaders(), body: JSON.stringify({ profile: input }) });
        addMsg('system', '个人信息已更新');
    }

    function addMsg(role, text) {
        hideWelcome();
        const box = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        if (role === 'ai') div.innerHTML = marked.parse(text);
        else div.textContent = text;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    async function send() {
        const input = document.getElementById('input');
        const msg = input.value.trim();
        if (!msg) return;
        input.value = '';
        addMsg('user', msg);

        const box = document.getElementById('chat-box');
        const thinking = document.createElement('div');
        thinking.className = 'msg ai'; thinking.id = 'thinking';
        thinking.innerHTML = '<span style="color:#fff;font-weight:300">思考中</span><span class="dot1">.</span><span class="dot2">.</span><span class="dot3">.</span> <span style="font-size:11px;color:#555">已思考 <span id="timer">0.0</span>s</span>';
        box.appendChild(thinking);
        box.scrollTop = box.scrollHeight;

        let seconds = 0;
        const timerInterval = setInterval(() => {
            seconds += 0.1;
            const el = document.getElementById('timer');
            if (el) el.textContent = seconds.toFixed(1) + 's';
        }, 100);

        const res = await fetch('/chat', {
            method: 'POST',
            headers: authHeaders(),
            body: JSON.stringify({ message: msg, history })
        });

        document.getElementById('thinking').remove();
        clearInterval(timerInterval);

        const aiDiv = document.createElement('div');
        aiDiv.className = 'msg ai';
        box.appendChild(aiDiv);

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let fullReply = '';
        let toolUsed = null;

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            const text = decoder.decode(value);
            const lines = text.split('\n');
            for (const line of lines) {
                if (!line.startsWith('data: ')) continue;
                try {
                    const data = JSON.parse(line.slice(6));
                    if (data.type === 'content') {
                        fullReply += data.content;
                        aiDiv.innerHTML = marked.parse(fullReply);
                        box.scrollTop = box.scrollHeight;
                    } else if (data.type === 'tool') {
                        toolUsed = data.tool_name;
                    } else if (data.type === 'done') {
                        history = data.history;
                        toolUsed = data.tool_used || toolUsed;
                    }
                } catch(e) {}
            }
        }

        const toolNames = { calculate: '计算', search_web: '搜索网络', get_current_time: '获取时间' };
        addMsg('system', toolUsed
            ? `使用了${toolNames[toolUsed] || toolUsed} · ${seconds.toFixed(1)}s`
            : `${seconds.toFixed(1)}s`
        );
    }

    async function uploadFile() {
        const fileInput = document.getElementById('file-input');
        const file = fileInput.files[0];
        if (!file) return;
        addMsg('system', `正在上传 ${file.name}...`);
        const formData = new FormData();
        formData.append('file', file);
        const res = await fetch('/upload', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}` },
            body: formData
        });
        const data = await res.json();
        addMsg('system', data.message);
    }

    document.getElementById('send').onclick = send;
    document.getElementById('input').addEventListener('keydown', e => {
        if (e.key === 'Enter') send();
    });
    document.getElementById('auth-password').addEventListener('keydown', e => {
        if (e.key === 'Enter') authSubmit();
    });
</script>
</body>
</html>
